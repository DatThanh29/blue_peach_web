name: Android CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Static checks, unit tests, and demo debug assemble
        run: ./gradlew --no-daemon ktlintCheck detekt :handmeasure-core:test :handtryon-core:test :HandMeasure:compileDebugKotlin :HandMeasure:testDebugUnitTest :HandTryOn:compileDebugKotlin :HandTryOn:testDebugUnitTest :app:compileDebugKotlin :app:assembleDebug

      - name: Upload demo debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
